name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-arm64:
    name: Build binary (macos-14 arm64)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller h9s.spec --clean

      - name: Rename artifact
        run: mv dist/h9s dist/h9s-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: h9s-macos-arm64
          path: dist/h9s-macos-arm64

  release:
    name: Create GitHub Release
    needs: build-arm64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: h9s-macos-arm64
          path: dist/

      - name: Compute SHA256 checksum
        run: sha256sum dist/h9s-macos-arm64 > checksums.txt && cat checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "${TAG}" \
            --title "H9S ${TAG}" \
            --notes-file .github/release-notes-template.md \
            dist/h9s-macos-arm64 \
            checksums.txt
